<div class="set">
    <div class="set__list-number">{listNumber}</div>
    <div class="set__body">
        <div class="set__weight set-item">
            <div class="set__text"></div>
            <div class="set__number">{weight}</div>
        </div>
        <div class="set__amount set-item">
            <div class="set__text"></div>
            <div class="set__number">{amount}</div>
        </div>
        <div class="set__comment set-item">
            <div class="set__text">{comment}</div>
        </div>
    </div>
</div>
